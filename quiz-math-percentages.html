<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תרגול אחוזים 🌟</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

#app {
  width: 100%;
  max-width: 560px;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 28px 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  margin-bottom: 16px;
}

/* ── Welcome ── */
.welcome-emoji { font-size: 64px; text-align: center; margin-bottom: 12px; }
.welcome-title { font-size: 26px; font-weight: 800; text-align: center; color: #4a2c8a; margin-bottom: 6px; }
.welcome-sub { font-size: 15px; color: #666; text-align: center; margin-bottom: 22px; }
.name-label { font-size: 15px; font-weight: 600; color: #444; margin-bottom: 8px; display: block; }
.name-input {
  width: 100%; padding: 12px 16px; border: 2px solid #ddd; border-radius: 12px;
  font-size: 17px; font-family: inherit; direction: rtl; outline: none;
  transition: border-color .2s;
}
.name-input:focus { border-color: #667eea; }

/* ── Progress bar ── */
.progress-wrap { margin-bottom: 16px; }
.progress-label { font-size: 13px; color: rgba(255,255,255,.85); margin-bottom: 6px; font-weight: 600; }
.progress-bar-bg { background: rgba(255,255,255,.3); border-radius: 99px; height: 10px; }
.progress-bar-fill { background: #ffd700; border-radius: 99px; height: 10px; transition: width .4s ease; }

/* ── Topic header ── */
.topic-tag {
  display: inline-block; background: #f0ebff; color: #5a2da5;
  font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 99px; margin-bottom: 10px;
}
.topic-title { font-size: 20px; font-weight: 800; color: #2d1b5e; margin-bottom: 4px; }
.topic-progress { font-size: 13px; color: #888; margin-bottom: 16px; }

/* ── Explanation card ── */
.explain-card {
  background: #f7f4ff; border-radius: 14px; padding: 16px 18px; margin-bottom: 14px;
  border-right: 4px solid #764ba2;
}
.explain-title { font-size: 14px; font-weight: 700; color: #5a2da5; margin-bottom: 8px; }
.explain-text { font-size: 14px; color: #333; line-height: 1.7; }
.explain-text b { color: #4a2c8a; }

.example-card {
  background: #fffbe6; border-radius: 14px; padding: 14px 18px; margin-bottom: 18px;
  border-right: 4px solid #ffd700;
}
.example-title { font-size: 13px; font-weight: 700; color: #b8860b; margin-bottom: 6px; }
.example-text { font-size: 14px; color: #333; line-height: 1.7; }

/* ── Question ── */
.question-text { font-size: 17px; font-weight: 700; color: #1a1a2e; margin-bottom: 18px; line-height: 1.5; }

/* Multiple choice */
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn {
  background: #f9f9f9; border: 2px solid #e0e0e0; border-radius: 12px;
  padding: 13px 16px; font-size: 15px; font-family: inherit;
  text-align: right; cursor: pointer; transition: all .15s; color: #222;
}
.choice-btn:hover:not(:disabled) { background: #f0ebff; border-color: #764ba2; }
.choice-btn.correct { background: #e8f8ee; border-color: #2ecc71; color: #1a7a42; font-weight: 700; }
.choice-btn.wrong { background: #fdecea; border-color: #e74c3c; color: #a02020; }
.choice-btn:disabled { cursor: default; }

/* Numeric input */
.num-row { display: flex; gap: 10px; align-items: center; }
.num-input {
  flex: 1; padding: 12px 16px; border: 2px solid #ddd; border-radius: 12px;
  font-size: 18px; font-family: inherit; text-align: center; outline: none;
  transition: border-color .2s;
}
.num-input:focus { border-color: #667eea; }
.num-input.correct { border-color: #2ecc71; background: #e8f8ee; }
.num-input.wrong { border-color: #e74c3c; background: #fdecea; }

/* ── Buttons ── */
.btn {
  display: block; width: 100%; padding: 14px; border: none; border-radius: 14px;
  font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer;
  transition: transform .1s, box-shadow .1s; margin-top: 14px;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; box-shadow: 0 4px 14px rgba(102,126,234,.4); }
.btn-primary:hover { box-shadow: 0 6px 18px rgba(102,126,234,.55); }
.btn-success { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; }
.btn-warning { background: linear-gradient(135deg, #f39c12, #e67e22); color: #fff; }

/* ── Feedback ── */
.feedback {
  border-radius: 14px; padding: 14px 18px; margin-top: 16px;
  font-size: 14px; line-height: 1.6; display: none;
}
.feedback.show { display: block; }
.feedback.correct { background: #e8f8ee; border: 2px solid #2ecc71; color: #1a5c33; }
.feedback.wrong { background: #fdecea; border: 2px solid #e74c3c; color: #7a1515; }
.feedback-icon { font-size: 22px; margin-bottom: 6px; display: block; }

/* ── Stars ── */
.stars-row { text-align: center; font-size: 28px; margin: 10px 0; letter-spacing: 4px; }
.score-big { font-size: 48px; font-weight: 900; color: #4a2c8a; text-align: center; margin: 10px 0; }
.summary-msg { font-size: 16px; color: #444; text-align: center; line-height: 1.6; margin-bottom: 18px; }

/* ── Animations ── */
@keyframes bounce-in {
  0% { transform: scale(.5); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.anim-bounce { animation: bounce-in .35s ease; }
.anim-shake { animation: shake .3s ease; }

/* topic pills row */
.topic-pills { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.pill {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 13px; font-weight: 800;
  background: rgba(255,255,255,.25); color: rgba(255,255,255,.7);
}
.pill.done { background: #ffd700; color: #4a2c8a; }
.pill.active { background: #fff; color: #4a2c8a; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════
// QUESTION BANK
// ═══════════════════════════════════════════════════════════
const TOPICS = [
  {
    id: 0,
    title: "השוואה בין אחוזים, שברים ומספרים עשרוניים",
    short: "השוואה",
    explain: `<b>כלל הזהב:</b> אחוז הוא חלקים ממאה.<br>
50% = <b>50/100</b> = <b>0.5</b><br>
25% = <b>25/100 = 1/4</b> = <b>0.25</b><br><br>
כדי להשוות — הופכים הכל לאחוזים או הכל לעשרוניים.`,
    example: `<b>שאלה:</b> מה גדול יותר: 0.4 או 35%?<br>
<b>פתרון:</b> 0.4 = 40%. לכן 0.4 > 35%.`,
    questions: [
      { type:"mc", q:"מה גדול יותר?", opts:["0.4","35%","שווים","0.3"], answer:0, expl:"0.4 = 40%, ו-40% > 35%." },
      { type:"mc", q:"מה הם 1/4 כאחוז?", opts:["25%","40%","20%","50%"], answer:0, expl:"1/4 = 25/100 = 25%." },
      { type:"mc", q:'מהו 0.75 כשבר?', opts:["3/4","1/4","7/5","3/5"], answer:0, expl:"0.75 = 75/100 = 3/4." },
      { type:"mc", q:"מה גדול יותר: 1/2 או 45%?", opts:["1/2","45%","שווים","לא ניתן לדעת"], answer:0, expl:"1/2 = 50%, ו-50% > 45%." },
      { type:"mc", q:"מה שווה 0.2?", opts:["1/5","1/2","2/3","20"], answer:0, expl:"0.2 = 2/10 = 1/5." },
      { type:"mc", q:"סדרי מהקטן לגדול: 0.3, 1/4, 28%", opts:["1/4, 28%, 0.3","28%, 1/4, 0.3","0.3, 28%, 1/4","שווים"], answer:0, expl:"1/4=25%, 28%=28%, 0.3=30%. סדר: 25%<28%<30%." },
      { type:"mc", q:"מה שווה 60%?", opts:["3/5","2/3","6/5","3/4"], answer:0, expl:"60% = 60/100 = 3/5." },
      { type:"mc", q:"מה קטן יותר: 0.05 או 5%?", opts:["שווים","0.05","5%","לא ניתן לדעת"], answer:0, expl:"0.05 = 5% — שווים בדיוק!" },
      { type:"mc", q:"מה הם 2/5 כאחוז?", opts:["40%","25%","50%","35%"], answer:0, expl:"2/5 = 40/100 = 40%." },
    ]
  },
  {
    id: 1,
    title: "חישוב האחוז",
    short: "חישוב %",
    explain: `<b>שאלה:</b> כמה אחוז הוא <b>חלק</b> מתוך <b>שלם</b>?<br><br>
<b>נוסחה:</b> אחוז = (חלק ÷ שלם) × 100`,
    example: `<b>שאלה:</b> 15 הם כמה אחוז מ-60?<br>
<b>פתרון:</b> (15 ÷ 60) × 100 = 0.25 × 100 = <b>25%</b>`,
    questions: [
      { type:"num", q:"12 הם כמה אחוז מ-48?", answer:25, expl:"12 ÷ 48 × 100 = 25%." },
      { type:"num", q:"30 הם כמה אחוז מ-120?", answer:25, expl:"30 ÷ 120 × 100 = 25%." },
      { type:"num", q:"18 הם כמה אחוז מ-90?", answer:20, expl:"18 ÷ 90 × 100 = 20%." },
      { type:"num", q:"7 הם כמה אחוז מ-35?", answer:20, expl:"7 ÷ 35 × 100 = 20%." },
      { type:"num", q:"45 הם כמה אחוז מ-180?", answer:25, expl:"45 ÷ 180 × 100 = 25%." },
      { type:"num", q:"16 הם כמה אחוז מ-80?", answer:20, expl:"16 ÷ 80 × 100 = 20%." },
      { type:"num", q:"9 הם כמה אחוז מ-36?", answer:25, expl:"9 ÷ 36 × 100 = 25%." },
      { type:"num", q:"6 הם כמה אחוז מ-24?", answer:25, expl:"6 ÷ 24 × 100 = 25%." },
      { type:"num", q:"50 הם כמה אחוז מ-200?", answer:25, expl:"50 ÷ 200 × 100 = 25%." },
    ]
  },
  {
    id: 2,
    title: "חישוב אחוז מכמות",
    short: "% מכמות",
    explain: `<b>שאלה:</b> מה הם X% מתוך מספר מסוים?<br><br>
<b>נוסחה:</b> תוצאה = (אחוז ÷ 100) × כמות`,
    example: `<b>שאלה:</b> מה הם 30% מ-80?<br>
<b>פתרון:</b> (30 ÷ 100) × 80 = 0.3 × 80 = <b>24</b>`,
    questions: [
      { type:"num", q:"מה הם 20% מ-150?", answer:30, expl:"0.2 × 150 = 30." },
      { type:"num", q:"מה הם 25% מ-200?", answer:50, expl:"0.25 × 200 = 50." },
      { type:"num", q:"מה הם 10% מ-340?", answer:34, expl:"0.1 × 340 = 34." },
      { type:"num", q:"מה הם 50% מ-86?", answer:43, expl:"0.5 × 86 = 43." },
      { type:"num", q:"מה הם 15% מ-60?", answer:9, expl:"0.15 × 60 = 9." },
      { type:"num", q:"מה הם 40% מ-90?", answer:36, expl:"0.4 × 90 = 36." },
      { type:"num", q:"מה הם 5% מ-120?", answer:6, expl:"0.05 × 120 = 6." },
      { type:"num", q:"מה הם 75% מ-80?", answer:60, expl:"0.75 × 80 = 60." },
      { type:"num", q:"מה הם 30% מ-70?", answer:21, expl:"0.3 × 70 = 21." },
    ]
  },
  {
    id: 3,
    title: "חישוב כמות לאחר שינוי באחוז",
    short: "הנחה/התייקרות",
    explain: `<b>הנחה (ירידה):</b> מחיר × (1 − אחוז÷100)<br>
<b>התייקרות (עלייה):</b> מחיר × (1 + אחוז÷100)<br><br>
<b>קיצור:</b> הנחה של 15% = כפל ב-0.85. עלייה של 20% = כפל ב-1.2.`,
    example: `<b>שאלה:</b> חולצה עולה 200₪. יש הנחה של 15%. כמה משלמים?<br>
<b>פתרון:</b> 200 × 0.85 = <b>170₪</b>`,
    questions: [
      { type:"num", q:"שמלה עולה 300₪. יש הנחה של 10%. כמה משלמים?", answer:270, expl:"300 × 0.9 = 270₪." },
      { type:"num", q:"כרטיס לסרט עולה 40₪. התייקר ב-25%. מה המחיר החדש?", answer:50, expl:"40 × 1.25 = 50₪." },
      { type:"num", q:"זוג נעליים עולה 400₪. יש הנחה של 20%. כמה משלמים?", answer:320, expl:"400 × 0.8 = 320₪." },
      { type:"num", q:"ספר עולה 80₪. התייקר ב-15%. מה המחיר החדש?", answer:92, expl:"80 × 1.15 = 92₪." },
      { type:"num", q:"מחשב עולה 2000₪. יש הנחה של 30%. כמה משלמים?", answer:1400, expl:"2000 × 0.7 = 1400₪." },
      { type:"num", q:"ארוחה עולה 120₪. יש הנחה של 5%. כמה משלמים?", answer:114, expl:"120 × 0.95 = 114₪." },
      { type:"num", q:"משחק עולה 60₪. התייקר ב-50%. מה המחיר החדש?", answer:90, expl:"60 × 1.5 = 90₪." },
      { type:"num", q:"כובע עולה 50₪. יש הנחה של 40%. כמה משלמים?", answer:30, expl:"50 × 0.6 = 30₪." },
      { type:"num", q:"אוטובוס עולה 8₪. התייקר ב-25%. מה המחיר החדש?", answer:10, expl:"8 × 1.25 = 10₪." },
    ]
  },
  {
    id: 4,
    title: "חישוב אחוז לאחר שינוי בכמות",
    short: "% שינוי",
    explain: `<b>שאלה:</b> ב-כמה אחוז השתנה המחיר/הכמות?<br><br>
<b>נוסחה:</b> אחוז שינוי = (שינוי ÷ מקורי) × 100<br>
שינוי = ערך חדש − ערך ישן`,
    example: `<b>שאלה:</b> מחיר עלה מ-80₪ ל-100₪. באיזה אחוז עלה?<br>
<b>פתרון:</b> שינוי = 20. (20 ÷ 80) × 100 = <b>25%</b>`,
    questions: [
      { type:"num", q:"מחיר עלה מ-50₪ ל-60₪. באיזה אחוז עלה?", answer:20, expl:"שינוי=10. 10÷50×100=20%." },
      { type:"num", q:"מחיר ירד מ-200₪ ל-160₪. באיזה אחוז ירד?", answer:20, expl:"שינוי=40. 40÷200×100=20%." },
      { type:"num", q:"כמות עלתה מ-40 ל-50. באיזה אחוז עלתה?", answer:25, expl:"שינוי=10. 10÷40×100=25%." },
      { type:"num", q:"מחיר ירד מ-120₪ ל-90₪. באיזה אחוז ירד?", answer:25, expl:"שינוי=30. 30÷120×100=25%." },
      { type:"num", q:"ציון עלה מ-60 ל-75. באיזה אחוז עלה?", answer:25, expl:"שינוי=15. 15÷60×100=25%." },
      { type:"num", q:"מחיר עלה מ-80₪ ל-96₪. באיזה אחוז עלה?", answer:20, expl:"שינוי=16. 16÷80×100=20%." },
      { type:"num", q:"מספר תלמידים ירד מ-30 ל-24. באיזה אחוז ירד?", answer:20, expl:"שינוי=6. 6÷30×100=20%." },
      { type:"num", q:"משקל עלה מ-40 ל-48 ק\"ג. באיזה אחוז עלה?", answer:20, expl:"שינוי=8. 8÷40×100=20%." },
      { type:"num", q:"מחיר עלה מ-60₪ ל-75₪. באיזה אחוז עלה?", answer:25, expl:"שינוי=15. 15÷60×100=25%." },
    ]
  }
];

const PASS_THRESHOLD = 3;
const MAX_QUESTIONS = 5;

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let state = {
  screen: "welcome",   // welcome | quiz | summary
  name: "",
  topicIndex: 0,
  stars: 0,
  // per-topic
  asked: 0,
  correct: 0,
  pool: [],            // shuffled question indices
  poolPos: 0,
  answered: false,     // waiting for "next" after answering
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initTopic(idx) {
  state.topicIndex = idx;
  state.asked = 0;
  state.correct = 0;
  state.answered = false;
  state.pool = shuffle(TOPICS[idx].questions.map((_, i) => i));
  state.poolPos = 0;
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
const app = document.getElementById("app");

function render() {
  if (state.screen === "welcome") renderWelcome();
  else if (state.screen === "quiz") renderQuiz();
  else renderSummary();
}

// ── Welcome ──────────────────────────────────────────────
function renderWelcome() {
  app.innerHTML = `
    <div class="card anim-bounce">
      <div class="welcome-emoji">🧮</div>
      <div class="welcome-title">תרגול אחוזים</div>
      <div class="welcome-sub">מבדק ביום א' — בואי נתאמן יחד!</div>
      <label class="name-label" for="nameInput">מה שמך?</label>
      <input id="nameInput" class="name-input" placeholder="כתבי את שמך כאן..." maxlength="30" autocomplete="off">
      <button class="btn btn-primary" onclick="startQuiz()">בואי נתחיל! 🚀</button>
    </div>`;
  document.getElementById("nameInput").addEventListener("keydown", e => {
    if (e.key === "Enter") startQuiz();
  });
}

function startQuiz() {
  const val = document.getElementById("nameInput").value.trim();
  state.name = val || "חברה";
  initTopic(0);
  state.screen = "quiz";
  render();
}

// ── Progress pills ────────────────────────────────────────
function pillsHTML() {
  return `<div class="topic-pills">` +
    TOPICS.map((t, i) => {
      let cls = i < state.topicIndex ? "pill done" : i === state.topicIndex ? "pill active" : "pill";
      let icon = i < state.topicIndex ? "✓" : i + 1;
      return `<div class="${cls}">${icon}</div>`;
    }).join("") +
    `</div>`;
}

// ── Quiz ─────────────────────────────────────────────────
function renderQuiz() {
  const topic = TOPICS[state.topicIndex];
  const qIdx = state.pool[state.poolPos];
  const q = topic.questions[qIdx];

  const pct = (state.topicIndex / TOPICS.length) * 100;

  let questionHTML = "";
  if (q.type === "mc") {
    questionHTML = `<div class="choices" id="choices">` +
      q.opts.map((o, i) => `<button class="choice-btn" onclick="handleMC(${i})">${o}</button>`).join("") +
      `</div>`;
  } else {
    questionHTML = `
      <div class="num-row">
        <input id="numInput" class="num-input" type="number" placeholder="?" autocomplete="off">
        <button class="btn btn-primary" style="margin:0;width:auto;padding:12px 20px" onclick="handleNum()">בדקי</button>
      </div>`;
  }

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-label">נושא ${state.topicIndex + 1} מתוך ${TOPICS.length} · ⭐ ${state.stars}</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    ${pillsHTML()}
    <div class="card">
      <span class="topic-tag">נושא ${state.topicIndex + 1}</span>
      <div class="topic-title">${topic.title}</div>
      <div class="topic-progress">שאלה ${state.asked + 1} · נכון: ${state.correct} / ${PASS_THRESHOLD}</div>

      <div class="explain-card">
        <div class="explain-title">📖 הסבר</div>
        <div class="explain-text">${topic.explain}</div>
      </div>
      <div class="example-card">
        <div class="example-title">💡 דוגמה</div>
        <div class="example-text">${topic.example}</div>
      </div>

      <div class="question-text">${q.q}</div>
      ${questionHTML}
      <div id="feedback" class="feedback"></div>
      <div id="nextWrap"></div>
    </div>`;

  if (q.type === "num") {
    document.getElementById("numInput").addEventListener("keydown", e => {
      if (e.key === "Enter") handleNum();
    });
  }
}

// ── Answer handlers ───────────────────────────────────────
function handleMC(chosen) {
  if (state.answered) return;
  state.answered = true;
  const topic = TOPICS[state.topicIndex];
  const q = topic.questions[state.pool[state.poolPos]];
  const correct = chosen === q.answer;

  const btns = document.querySelectorAll(".choice-btn");
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    else if (i === chosen && !correct) b.classList.add("wrong");
  });

  processAnswer(correct, q.expl);
}

function handleNum() {
  if (state.answered) return;
  const input = document.getElementById("numInput");
  const val = parseFloat(input.value);
  if (isNaN(val)) { input.focus(); return; }

  state.answered = true;
  const topic = TOPICS[state.topicIndex];
  const q = topic.questions[state.pool[state.poolPos]];
  const correct = Math.abs(val - q.answer) < 0.05;

  input.disabled = true;
  input.classList.add(correct ? "correct" : "wrong");
  document.querySelector(".num-row button").disabled = true;

  processAnswer(correct, q.expl);
}

function processAnswer(correct, expl) {
  state.asked++;
  if (correct) state.correct++;

  const fb = document.getElementById("feedback");
  fb.className = "feedback show anim-bounce " + (correct ? "correct" : "wrong");

  if (correct) {
    state.stars++;
    fb.innerHTML = `<span class="feedback-icon">✅</span><b>כל הכבוד! נכון מאוד!</b><br>${expl}`;
  } else {
    fb.innerHTML = `<span class="feedback-icon">❌</span><b>לא מדויק.</b><br>${expl}`;
  }

  const nextWrap = document.getElementById("nextWrap");

  if (state.correct >= PASS_THRESHOLD) {
    // Topic passed
    fb.innerHTML += `<br><br>🌟 <b>מעולה! סיימת את הנושא הזה!</b>`;
    const label = state.topicIndex < TOPICS.length - 1 ? "לנושא הבא ➡" : "לסיכום 🏆";
    nextWrap.innerHTML = `<button class="btn btn-success" onclick="nextTopic()">${label}</button>`;
  } else if (state.asked >= MAX_QUESTIONS && state.correct < PASS_THRESHOLD) {
    // Failed topic
    fb.innerHTML += `<br><br>💪 <b>בואי נחזור ונתרגל שוב — את כמעט שם!</b>`;
    nextWrap.innerHTML = `<button class="btn btn-warning" onclick="retryTopic()">נסי שוב 🔄</button>`;
  } else {
    nextWrap.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">שאלה הבאה ➡</button>`;
  }
}

function nextQuestion() {
  state.poolPos = (state.poolPos + 1) % state.pool.length;
  state.answered = false;
  renderQuiz();
}

function nextTopic() {
  if (state.topicIndex < TOPICS.length - 1) {
    initTopic(state.topicIndex + 1);
    renderQuiz();
  } else {
    state.screen = "summary";
    render();
  }
}

function retryTopic() {
  initTopic(state.topicIndex);
  renderQuiz();
}

// ── Summary ───────────────────────────────────────────────
function renderSummary() {
  const total = TOPICS.length * PASS_THRESHOLD;
  const pct = Math.round((state.stars / (TOPICS.length * MAX_QUESTIONS)) * 100);
  let stars, msg;
  if (pct >= 75) { stars = "⭐⭐⭐"; msg = `וואו ${state.name}! את ממש מוכנה למבדק! תצליחי בענק! 🎉`; }
  else if (pct >= 50) { stars = "⭐⭐"; msg = `כל הכבוד ${state.name}! עבדת קשה. עוד קצת תרגול ואת מוכנה! 💪`; }
  else { stars = "⭐"; msg = `${state.name}, חזרי על ההסברים שוב — את בדרך הנכונה! 📚`; }

  app.innerHTML = `
    <div class="card anim-bounce" style="text-align:center">
      <div style="font-size:56px;margin-bottom:8px">🏆</div>
      <div class="topic-title" style="font-size:24px;margin-bottom:4px">סיימת!</div>
      <div class="stars-row">${stars}</div>
      <div class="score-big">${state.stars} ⭐</div>
      <div style="color:#888;font-size:14px;margin-bottom:16px">כוכבים שצברת</div>
      <div class="summary-msg">${msg}</div>
      <div style="background:#f7f4ff;border-radius:14px;padding:14px;margin-bottom:16px">
        ${TOPICS.map((t, i) => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:14px">
          <span>${t.short}</span><span>✅</span>
        </div>`).join("")}
      </div>
      <button class="btn btn-primary" onclick="restartAll()">תרגול נוסף 🔄</button>
    </div>`;
}

function restartAll() {
  state = { screen: "welcome", name: state.name, topicIndex: 0, stars: 0, asked: 0, correct: 0, pool: [], poolPos: 0, answered: false };
  render();
}

// ── Start ─────────────────────────────────────────────────
render();
</script>
</body>
</html>
